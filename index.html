<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תרגול אסטרטגיית תמחור</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            max-width: 600px;
            background: #fff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .question-container {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .question-wrapper {
            flex-grow: 1;
        }
        .question {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .translation-text {
            font-size: 1rem;
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
            display: none;
            direction: ltr;
            text-align: left;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .btn-translate {
            background-color: #6c757d;
            color: white;
        }
        .btn-speak {
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            font-size: 1.1rem;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            text-align: right;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            line-height: 1.5;
        }
        .feedback-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .feedback.wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .eng-feedback {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #f5c6cb;
            direction: ltr;
            text-align: left;
            display: none;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="question-container">
        <div class="question-wrapper">
            <div class="question" id="questionText">מהו הרכיב המרכזי במודל EVE המגדיר את מחיר החלופה הטובה ביותר בשוק?</div>
            <div class="translation-text" id="translationText">What is the core component in the EVE model that defines the price of the next best alternative in the market?</div>
        </div>
        <button class="btn-speak" onclick="speakQuestion()" title="הקרא שאלה">🔊</button>
    </div>
    
    <div class="btn-container">
        <button class="btn-translate" onclick="toggleTranslation()">Translation</button>
    </div>

    <div class="options" id="optionsContainer">
        <button class="option-btn" onclick="checkAnswer(false, 'differentiation')">א) ערך דיפרנציאלי (Differentiation Value)</button>
        <button class="option-btn" onclick="checkAnswer(true, 'reference')">ב) מחיר ייחוס (Reference Value)</button>
        <button class="option-btn" onclick="checkAnswer(false, 'capture')">ג) תפיסת מחיר (Price Capture)</button>
    </div>

    <div class="feedback" id="feedbackBox">
        <div class="feedback-content-wrapper">
            <div>
                <div id="feedbackHebrew"></div>
                <div class="eng-feedback" id="feedbackEnglish"></div>
            </div>
            <button class="btn-speak" onclick="speakFeedback()" title="הקרא משוב" style="background-color: #28a745;">🔊</button>
        </div>
    </div>
</div>

<script>
    let isTranslationVisible = false;
    let currentResult = null; 
    let currentOptionKey = null;

    // מאגר התשובות וההסברים בשתי השפות
    const explanations = {
        correct: {
            he: "כל הכבוד! מחיר ייחוס הוא אכן תג המחיר של החלופה הטובה ביותר של הלקוח בשוק.",
            en: "Excellent! Reference Value is indeed the price tag of the customer's next best alternative in the market."
        },
        wrong: {
            differentiation: {
                he: "לא מדויק. ערך דיפרנציאלי מייצג את הערך הייחודי שהמוצר שלך מוסיף או מחסיר מעבר לחלופה הקיימת.",
                en: "Incorrect. Differentiation Value represents the unique value your product adds or subtracts beyond the existing alternative."
            },
            capture: {
                he: "לא נכון. תפיסת מחיר היא החלק מתוך סך הערך הכלכלי שהחברה מחליטה לגבות בפועל.",
                en: "Incorrect. Price Capture is the percentage of the Total Economic Value that the company actually decides to charge."
            }
        }
    };

    // פונקציית כפתור התרגום - מציגה ומסתירה את האנגלית
    function toggleTranslation() {
        isTranslationVisible = !isTranslationVisible;
        const translationDiv = document.getElementById('translationText');
        const engFeedbackDiv = document.getElementById('feedbackEnglish');
        
        translationDiv.style.display = isTranslationVisible ? 'block' : 'none';
        
        // אם הסטודנט טעה והמשוב פתוח, כפתור התרגום ישלוט גם על תרגום המשוב
        if (currentResult === false && engFeedbackDiv.innerText !== "") {
            engFeedbackDiv.style.display = isTranslationVisible ? 'block' : 'none';
        }
    }

    // פונקציית בדיקת התשובות
    function checkAnswer(isCorrect, optionKey) {
        currentResult = isCorrect;
        currentOptionKey = optionKey;
        const feedbackBox = document.getElementById('feedbackBox');
        const feedbackHebrew = document.getElementById('feedbackHebrew');
        const feedbackEnglish = document.getElementById('feedbackEnglish');
        
        feedbackEnglish.style.display = 'none'; // איפוס ברירת מחדל

        if (isCorrect) {
            feedbackBox.className = "feedback correct";
            feedbackHebrew.innerText = explanations.correct.he;
            feedbackEnglish.innerText = explanations.correct.en;
            // בתשובה נכונה נציג אנגלית תמיד כחלק מהחיזוק
            feedbackEnglish.style.display = 'block';
        } else {
            feedbackBox.className = "feedback wrong";
            feedbackHebrew.innerText = explanations.wrong[optionKey].he;
            feedbackEnglish.innerText = explanations.wrong[optionKey].en;
            
            // בתשובה שגויה - האנגלית תוצג אך ורק אם כפתור התרגום לחוץ
            if (isTranslationVisible) {
                feedbackEnglish.style.display = 'block';
            }
        }

        feedbackBox.style.display = 'block';
    }

    // פונקציית הטקסט-לקול (Voice) הפנימית של הדפדפן
    function speakText(text, langCode) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // עצירת הקראות קודמות למניעת כפל קולות
            
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode; 
            window.speechSynthesis.speak(utterance);
        } else {
            alert("הדפדפן שלך אינו תומך בהקראת קול במערכת זו.");
        }
    }

    // הקראת השאלה בקול
    function speakQuestion() {
        const textHebrew = document.getElementById('questionText').innerText;
        speakText(textHebrew, 'he-IL'); // מקריא בעברית
        
        // אם כפתור התרגום פתוח, המערכת תקריא גם את השאלה באנגלית לאחר השהייה קלה
        if (isTranslationVisible) {
            const textEnglish = document.getElementById('translationText').innerText;
            setTimeout(() => {
                speakText(textEnglish, 'en-US'); // מקריא באנגלית
            }, 4000); 
        }
    }

    // הקראת משוב התשובה בקול
    function speakFeedback() {
        if (currentResult === null) return;
        
        let textHebrew = "";
        let textEnglish = "";

        if (currentResult) {
            textHebrew = explanations.correct.he;
            textEnglish = explanations.correct.en;
        } else if (currentOptionKey) {
            textHebrew = explanations.wrong[currentOptionKey].he;
            textEnglish = explanations.wrong[currentOptionKey].en;
        }

        speakText(textHebrew, 'he-IL'); // קודם כל מקריא בעברית

        // מקריא באנגלית רק אם מדובר בתשובה נכונה או אם כפתור התרגום לחוץ
        if (isTranslationVisible || currentResult) {
            setTimeout(() => {
                speakText(textEnglish, 'en-US');
            }, 4500);
        }
    }
</script>

</body>
</html>
