<head>

        :root {

        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 0.9em; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        .card {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .card.active { display: block; }
        .question {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .hint {
            font-size: 0.9rem;
            color: #95a5a6;
            font-style: italic;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background: #fff;
            border: 2px solid #34495e;
            border-radius: 8px;
            padding: 14px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: right;
            font-weight: 500;
        }
        .option-btn:hover:not([disabled]) {
            background: #f0f4f8;
            border-color: var(--primary);
        }
        .option-btn.correct {
            background: #e8f8f0;
            border-color: var(--success);
            color: #1e7e34;
        }
        .option-btn.wrong {
            background: #fce8e6;
            border-color: var(--danger);
            color: #bd2130;
        }
        .rationale {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: right;
            font-size: 1rem;
            line-height: 1.5;
        }
        .rationale.visible { display: block; }
        .next-btn {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }
        .next-btn:hover { opacity: 0.9; }
        
        /* מערכת בלונים */
        .balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            animation: floatUp 4s linear forwards;
        }
        .balloon::before {
            content: "";
            position: absolute;
            bottom: -8px; left: 18px;
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
            border-top: 8px solid currentColor;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

let questionsList = [];
let currentQuestionIndex = 0;
let score = 0;
let wrongAnswersIndex = JSON.parse(localStorage.getItem('wrong_verbs_index')) || [];

// בניית רשימת שאלות: שאלות שנטעו בהן קודם יופיעו קודם, ואז שאר המאגר
function initGame() {
    let wrongQs = allQuestions.filter((_, idx) => wrongAnswersIndex.includes(idx));
    let otherQs = allQuestions.filter((_, idx) => !wrongAnswersIndex.includes(idx));
    
    // ערבוב קל רק של השאלות האחרות כדי ליצור גיוון
    otherQs.sort(() => Math.random() - 0.5);
    
    questionsList = [...wrongQs, ...otherQs];
    currentQuestionIndex = 0;
    score = 0;
    
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= questionsList.length) {
        showResults();
        return;
    }

    const currentQ = questionsList[currentQuestionIndex];
    const isReview = wrongAnswersIndex.includes(allQuestions.indexOf(currentQ));

    // עדכון מד התקדמות
    document.getElementById('progress').style.width = `${(currentQuestionIndex / questionsList.length) * 100}%`;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';

    let html = `
        <div class="card active">
            ${isReview ? '<div style="background:#fff3cd; color:#856404; padding:5px; border-radius:5px; margin-bottom:10px; font-size:0.85em; font-weight:bold;">🔄 שאלה לתרגול חוזר (טעית בה בעבר)</div>' : ''}
            <div class="question">שאלה ${currentQuestionIndex + 1} מתוך ${questionsList.length}:<br>${currentQ.q}</div>
            <div class="hint">💡 רמז: ${currentQ.hint}</div>
            <div class="options">
    `;

    currentQ.options.forEach((opt, idx) => {
        html += `<button class="option-btn" onclick="checkAnswer(${idx}, this)">${opt}</button>`;
    });

    html += `</div></div>`;
    document.getElementById('quiz-space').innerHTML = html;
}

function checkAnswer(selectedIdx, btnElement) {
    const currentQ = questionsList[currentQuestionIndex];
    const originalIndex = allQuestions.indexOf(currentQ);
    const buttons = document.querySelectorAll('.option-btn');
    
    // נעילת שאר הכפתורים
    buttons.forEach(btn => btn.disabled = true);

    const rationaleSpace = document.getElementById('rationale-space');
    rationaleSpace.innerHTML = currentQ.rationales[selectedIdx];
    rationaleSpace.className = "rationale visible";

    if (selectedIdx === currentQ.correct) {
        btnElement.classList.add('correct');
        rationaleSpace.style.background = '#e8f8f0';
        rationaleSpace.style.color = '#1e7e34';
        score++;
        popBalloons();
        
        // אם הוא צדק בשאלה שהייתה ברשימת הטעויות - נסיר אותה לפעם הבאה
        wrongAnswersIndex = wrongAnswersIndex.filter(idx => idx !== originalIndex);
    } else {
        btnElement.classList.add('wrong');
        rationaleSpace.style.background = '#fce8e6';
        rationaleSpace.style.color = '#bd2130';
        
        // הצגת התשובה הנכונה בנוסף
        buttons[currentQ.correct].classList.add('correct');

        // הוספה לרשימת הטעויות לפעם הבאה (מחר) אם היא לא שם
        if (!wrongAnswersIndex.includes(originalIndex)) {
            wrongAnswersIndex.push(originalIndex);
        }
    }

    localStorage.setItem('wrong_verbs_index', JSON.stringify(wrongAnswersIndex));
    document.getElementById('next-action').style.display = 'inline-block';
}

function nextQuestion() {
    currentQuestionIndex++;
    showQuestion();
}

function showResults() {
    document.getElementById('progress').style.width = '100%';
    const pct = Math.round((score / questionsList.length) * 100);
    
    let summaryMessage = "";
    if (pct === 100) summaryMessage = "מושלם! אלוף העולם בפעלים! 🏆";
    else if (pct >= 80) summaryMessage = "כל הכבוד! תוצאה מצוינת! 🌟";
    else summaryMessage = "עבודה טובה, תרגול נוסף מחר יעזור לך להשתפר פלאים! 📖";

    let html = `
        <div class="card active">
            <h2>סיימנו את התרגיל! 🎉</h2>
            <p style="font-size: 1.4rem; font-weight: bold; margin: 20px 0;">הציון שלך הוא: ${score} מתוך ${questionsList.length} (${pct}%)</p>
            <p>${summaryMessage}</p>
            <p style="color: #7f8c8d; font-size:0.9em; margin-top:15px;">הודות למערכת המשחק, טעויות נשמרו ויחזרו כאתגר בתחילת המשחק הבא.</p>
            <button class="next-btn" style="display:inline-block; background:var(--success);" onclick="initGame()">לתרגל שוב כעת 🔄</button>
        </div>
    `;
    document.getElementById('quiz-space').innerHTML = html;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';
}

// אפקט בלונים קופצים
function popBalloons() {
    const container = document.getElementById('balloon-container');
    const colors = ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#ff9f43'];
    
    for (let i = 0; i < 12; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        
        // מיקום אקראי וצבע אקראי
        balloon.style.left = Math.random() * 100 + 'vw';
        const color = colors[Math.floor(Math.random() * colors.length)];
        balloon.style.backgroundColor = color;
        balloon.style.color = color;
        
        // מהירות ואנימציה משתנה
        balloon.style.animationDelay = (Math.random() * 0.5) + 's';
        balloon.style.animationDuration = (3 + Math.random() * 2) + 's';
        
        container.appendChild(balloon);
        
        // מחיקה לאחר סיום האנימציה
        setTimeout(() => balloon.remove(), 5000);
    }
}

// הפעלה ראשונית
initGame();
</script>
