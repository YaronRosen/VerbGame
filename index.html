<!DOCTYPE html>

<head>

    <style>

        .subtitle { color: #7f8c8d; margin-bottom: 15px; font-size: 0.9em; }
        
        .lang-toggle-btn {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: background 0.2s;
        }

            justify-content: center;

            margin-bottom: 10px;

            font-weight: bold;
            line-height: 1.6;

            flex: 1;

            display: none;

            border-left: 2px solid transparent;
            border-right: 2px solid transparent;

</head>

let questionsList = [];
let currentQuestionIndex = 0;
let score = 0;
let wrongAnswersIndex = JSON.parse(localStorage.getItem('wrong_verbs_index')) || [];

function toggleEnglish() {
    englishMode = !englishMode;
    const btn = document.getElementById('lang-toggle');
    if (englishMode) {
        btn.innerText = "English Translation: ON 🌐";
        btn.classList.add('eng-active');
    } else {
        btn.innerText = "English Translation: OFF 🌐";
        btn.classList.remove('eng-active');
    }
    
    const engDiv = document.getElementById('eng-trans');
    if (engDiv) {
        if (englishMode) engDiv.classList.add('visible');
        else engDiv.classList.remove('visible');
    }
}

function speak(text, lang) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanText = lang === 'he' ? text.replace(/[\u0591-\u05C7]/g, "") : text;
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = lang === 'he' ? 'he-IL' : 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("הדפדפן שלך לא תומך בהקראה קולית.");
    }
}

function initGame() {
    let wrongQs = allQuestions.filter((_, idx) => wrongAnswersIndex.includes(idx));
    let otherQs = allQuestions.filter((_, idx) => !wrongAnswersIndex.includes(idx));
    
    otherQs.sort(() => Math.random() - 0.5);
    
    questionsList = [...wrongQs, ...otherQs];
    currentQuestionIndex = 0;
    score = 0;
    
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= questionsList.length) {
        showResults();
        return;
    }

    const currentQ = questionsList[currentQuestionIndex];
    const isReview = wrongAnswersIndex.includes(allQuestions.indexOf(currentQ));

    document.getElementById('progress').style.width = `${(currentQuestionIndex / questionsList.length) * 100}%`;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';

    const readableHebrew = currentQ.q.replace("_______", "סמנו את הפועל המתאים");

    let html = `
        <div class="card active">
            ${isReview ? '<div style="background:#fff3cd; color:#856404; padding:5px; border-radius:5px; margin-bottom:10px; font-size:0.85em; font-weight:bold;">🔄 שאלה לתרגול חוזר / Review Question</div>' : ''}
            
            <div class="question-wrapper">
                <p class="question">שאלה ${currentQuestionIndex + 1} מתוך ${questionsList.length}:<br>${currentQ.q}</p>
                <button class="audio-btn" title="הקרא בעברית" onclick="speak('${readableHebrew.replace(/'/g, "\\'")}', 'he')">🔊</button>
            </div>
            
            <div id="eng-trans" class="english-translation ${englishMode ? 'visible' : ''}">
                <div class="eng-content-wrapper">
                    <div style="text-align: left;">
                        <b>English:</b> ${currentQ.q_en}<br>
                        <small style="color:#7f8c8d;">💡 Hint: ${currentQ.hint_en}</small>
                    </div>
                    <button class="audio-btn" title="Listen in English" onclick="speak('${currentQ.q_en.replace(/'/g, "\\'")}', 'en')">🔊</button>
                </div>
            </div>

            <div class="hint">💡 רמז: ${currentQ.hint}</div>
            <div class="options">
    `;

    currentQ.options.forEach((opt, idx) => {
        html += `<button class="option-btn" onclick="checkAnswer(${idx}, this)">${opt}</button>`;
    });

    html += `</div></div>`;
    document.getElementById('quiz-space').innerHTML = html;
}

function checkAnswer(selectedIdx, btnElement) {
    const currentQ = questionsList[currentQuestionIndex];
    const originalIndex = allQuestions.indexOf(currentQ);
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach(btn => btn.disabled = true);

    const rationaleSpace = document.getElementById('rationale-space');
    rationaleSpace.innerHTML = currentQ.rationales[selectedIdx] || "תשובה נכונה!";
    rationaleSpace.className = "rationale visible";

    if (selectedIdx === currentQ.correct) {
        btnElement.classList.add('correct');
        rationaleSpace.style.background = '#e8f8f0';
        rationaleSpace.style.color = '#1e7e34';
        score++;
        popBalloons();
        
        wrongAnswersIndex = wrongAnswersIndex.filter(idx => idx !== originalIndex);
    } else {
        btnElement.classList.add('wrong');
        rationaleSpace.style.background = '#fce8e6';
        rationaleSpace.style.color = '#bd2130';
        
        buttons[currentQ.correct].classList.add('correct');

        if (!wrongAnswersIndex.includes(originalIndex)) {
            wrongAnswersIndex.push(originalIndex);
        }
    }

    localStorage.setItem('wrong_verbs_index', JSON.stringify(wrongAnswersIndex));
    document.getElementById('next-action').style.display = 'inline-block';
}

function nextQuestion() {
    currentQuestionIndex++;
    showQuestion();
}

function showResults() {
    document.getElementById('progress').style.width = '100%';
    const pct = Math.round((score / questionsList.length) * 100);
    
    let summaryMessage = "";
    if (pct === 100) summaryMessage = "מושלם! אלוף העולם בפעלים! 🏆 / Perfect Score!";
    else if (pct >= 80) summaryMessage = "כל הכבוד! תוצאה מצוינת! 🌟 / Great job!";
    else summaryMessage = "תרגול נוסף מחר יעזור לך להשתפר פלאים! 📖 / Keep practicing!";

    let html = `
        <div class="card active">
            <h2>סיימנו את התרגיל! 🎉 Done!</h2>
            <p style="font-size: 1.4rem; font-weight: bold; margin: 20px 0;">הציון שלך: ${score} מתוך ${questionsList.length} (${pct}%)</p>
            <p>${summaryMessage}</p>
            <button class="next-btn" style="display:inline-block; background:var(--success);" onclick="initGame()">לתרגל שוב / Play Again 🔄</button>
        </div>
    `;
    document.getElementById('quiz-space').innerHTML = html;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';
}

function popBalloons() {
    const container = document.getElementById('balloon-container');
    const colors = ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#ff9f43'];
    
    for (let i = 0; i < 12; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.left = Math.random() * 100 + 'vw';
        const color = colors[Math.floor(Math.random() * colors.length)];
        balloon.style.backgroundColor = color;
        balloon.style.color = color;
        balloon.style.animationDelay = (Math.random() * 0.5) + 's';
        balloon.style.animationDuration = (3 + Math.random() * 2) + 's';
        
        container.appendChild(balloon);
        setTimeout(() => balloon.remove(), 5000);
    }
}

initGame();
</script>

</body>
</html>
