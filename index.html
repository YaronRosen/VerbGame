let questionsList = [];
let currentQuestionIndex = 0;
let score = 0;
let sessionWrongAnswers = []; 

function playBellSound(callback) {
    if (!window.AudioContext && !window.webkitAudioContext) {
        if(callback) callback();
        return;
    }
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain1.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1320, audioCtx.currentTime); 
        gain2.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        
        osc1.start();
        osc2.start();
        osc1.stop(audioCtx.currentTime + 0.8);
        osc2.stop(audioCtx.currentTime + 0.5);
        
        setTimeout(() => {
            audioCtx.close();
            if(callback) callback();
        }, 1000);
    } catch(e) {
        if(callback) callback();
    }
}

function toggleEnglish() {
    englishMode = !englishMode;
    const btn = document.getElementById('lang-toggle');
    if (englishMode) {
        btn.innerText = "English Translation: ON 🌐";
        btn.classList.add('eng-active');
    } else {
        btn.innerText = "English Translation: OFF 🌐";
        btn.classList.remove('eng-active');
    }
    
    const engDiv = document.getElementById('eng-trans');
    if (engDiv) {
        if (englishMode) engDiv.classList.add('visible');
        else engDiv.classList.remove('visible');
    }
}

function speakSentenceWithPause(fullText, isHebrew, buttonElement) {
    if (!('speechSynthesis' in window)) {
        alert("הדפדפן שלך לא תומך בהקראה קולית.");
        return;
    }

    window.speechSynthesis.cancel();
    if (currentTimeout) clearTimeout(currentTimeout);
    
    document.querySelectorAll('.audio-btn').forEach(btn => btn.classList.remove('playing'));
    buttonElement.classList.add('playing');

    let processingText = fullText;
    
    if (isHebrew) {
        processingText = processingText.replace(/\s*\([^)]+\)\s*\.?$/, "");
        processingText = processingText.replace(/[\u0591-\u05C7]/g, "");
    }

    const parts = processingText.split("_______");
    const part1 = parts[0] ? parts[0].trim() : "";
    const part2 = parts[1] ? parts[1].trim() : "";

    const langCode = isHebrew ? 'he-IL' : 'en-US';

    if (part1) {
        const utterance1 = new SpeechSynthesisUtterance(part1);
        utterance1.lang = langCode;
        utterance1.rate = 0.85;

        utterance1.onend = function() {
            playBellSound(() => {
                if (part2) {
                    const utterance2 = new SpeechSynthesisUtterance(part2);
                    utterance2.lang = langCode;
                    utterance2.rate = 0.85;
                    utterance2.onend = () => buttonElement.classList.remove('playing');
                    window.speechSynthesis.speak(utterance2);
                } else {
                    buttonElement.classList.remove('playing');
                }
            });
        };
        window.speechSynthesis.speak(utterance1);
    } else if (part2) {
        playBellSound(() => {
            const utterance2 = new SpeechSynthesisUtterance(part2);
            utterance2.lang = langCode;
            utterance2.rate = 0.85;
            utterance2.onend = () => buttonElement.classList.remove('playing');
            window.speechSynthesis.speak(utterance2);
        });
    }
}

function initGame() {
    questionsList = [...allQuestions];
    questionsList.sort(() => Math.random() - 0.5);
    
    currentQuestionIndex = 0;
    score = 0;
    sessionWrongAnswers = []; 
    
    showQuestion();
}

function startWrongQuestionsRoutine() {
    questionsList = [...sessionWrongAnswers];
    questionsList.sort(() => Math.random() - 0.5);
    
    currentQuestionIndex = 0;
    sessionWrongAnswers = []; 
    
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= questionsList.length) {
        handleRoundEnd();
        return;
    }

    window.speechSynthesis.cancel();
    if (currentTimeout) clearTimeout(currentTimeout);

    const currentQ = questionsList[currentQuestionIndex];

    document.getElementById('progress').style.width = `${(currentQuestionIndex / questionsList.length) * 100}%`;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';

    let html = `
        <div class="card active">
            <div class="question-wrapper">
                <p class="question">שאלה ${currentQuestionIndex + 1} מתוך ${questionsList.length}:<br>${currentQ.q}</p>
                <button class="audio-btn" title="הקרא עם פעמון" onclick="speakSentenceWithPause('${currentQ.q.replace(/'/g, "\\'")}', true, this)">🔊</button>
            </div>
            
            <div id="eng-trans" class="english-translation ${englishMode ? 'visible' : ''}">
                <div class="eng-content-wrapper">
                    <div style="text-align: left;">
                        <b>English:</b> ${currentQ.q_en}<br>
                        <small style="color:#7f8c8d;">💡 Hint: ${currentQ.hint_en}</small>
                    </div>
                    <button class="audio-btn" title="Listen with chime" onclick="speakSentenceWithPause('${currentQ.q_en.replace(/'/g, "\\'")}', false, this)">🔊</button>
                </div>
            </div>

            <div class="hint">💡 רמז: ${currentQ.hint}</div>
            <div class="options">
    `;

    currentQ.options.forEach((opt, idx) => {
        html += `<button class="option-btn" onclick="checkAnswer(${idx}, this)">${opt}</button>`;
    });

    html += `</div></div>`;
    document.getElementById('quiz-space').innerHTML = html;
}

function checkAnswer(selectedIdx, btnElement) {
    window.speechSynthesis.cancel();
    if (currentTimeout) clearTimeout(currentTimeout);
    document.querySelectorAll('.audio-btn').forEach(btn => btn.classList.remove('playing'));

    const currentQ = questionsList[currentQuestionIndex];
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach(btn => btn.disabled = true);

    const rationaleSpace = document.getElementById('rationale-space');
    rationaleSpace.innerHTML = currentQ.rationales[selectedIdx] || "תשובה נכונה!";
    rationaleSpace.className = "rationale visible";

    if (selectedIdx === currentQ.correct) {
        btnElement.classList.add('correct');
        rationaleSpace.style.background = '#e8f8f0';
        rationaleSpace.style.color = '#1e7e34';
        score++;
        popBalloons();
    } else {
        btnElement.classList.add('wrong');
        rationaleSpace.style.background = '#fce8e6';
        rationaleSpace.style.color = '#bd2130';
        
        buttons[currentQ.correct].classList.add('correct');

        if (!sessionWrongAnswers.includes(currentQ)) {
            sessionWrongAnswers.push(currentQ);
        }
    }

    document.getElementById('next-action').style.display = 'inline-block';
}

function nextQuestion() {
    currentQuestionIndex++;
    showQuestion();
}

function handleRoundEnd() {
    document.getElementById('progress').style.width = '100%';
    
    if (sessionWrongAnswers.length > 0) {
        let html = `
            <div class="card active" style="padding: 20px; border: 2px dashed #f39c12; background: #fffdf6; border-radius: 12px;">
                <h2 style="color: #d35400; margin-bottom: 8px;">עכשיו נפתור שוב את הכרטיסיות שטעית בהם</h2>
                <h3 style="color: #7f8c8d; font-weight: normal; margin-top: 0; font-size: 1.15rem; direction: ltr; text-align: center;">
                    Now let's solve again the cards you got wrong
                </h3>
                <p style="margin: 15px 0; color: #34495e;">נשארו ${sessionWrongAnswers.length} כרטיסיות הדורשות תרגול נוסף.</p>
                <button class="next-btn" style="display:inline-block; background: #f39c12;" onclick="wrongAnswersIndex.length > 0 ? startWrongQuestionsRoutine() : startWrongQuestionsRoutine()">שנתחיל? / Let's go ➔</button>
            </div>
        `;
        document.getElementById('quiz-space').innerHTML = html;
        document.getElementById('rationale-space').className = "rationale";
        document.getElementById('next-action').style.display = 'none';
    } else {
        showResults();
    }
}

function showResults() {
    let html = `
        <div class="card active">
            <h2>סיימנו את כל הכרטיסיות בהצלחה! 🎉</h2>
            <p style="font-size: 1.4rem; font-weight: bold; margin: 20px 0; color: var(--success);">
                כל הכבוד! ענית נכון על כל השאלות! 🏆
            </p>
            <p style="color: #7f8c8d; font-size: 1.1rem;">You successfully cleared all cards with zero mistakes!</p>
            <button class="next-btn" style="display:inline-block; background:var(--primary); margin-top:30px;" onclick="initGame()">משחק חדש / Play Again 🔄</button>
        </div>
    `;
    document.getElementById('quiz-space').innerHTML = html;
    document.getElementById('rationale-space').className = "rationale";
    document.getElementById('next-action').style.display = 'none';
}

function popBalloons() {
    const container = document.getElementById('balloon-container');
    const colors = ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#ff9f43'];
    
    for (let i = 0; i < 12; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.left = Math.random() * 100 + 'vw';
        const color = colors[Math.floor(Math.random() * colors.length)];
        balloon.style.backgroundColor = color;
        balloon.style.color = color;
        balloon.style.animationDelay = (Math.random() * 0.5) + 's';
        balloon.style.animationDuration = (3 + Math.random() * 2) + 's';
        
        container.appendChild(balloon);
        setTimeout(() => balloon.remove(), 5000);
    }
}

initGame();
